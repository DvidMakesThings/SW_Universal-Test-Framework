# CH347 SWD adapter configuration for OpenOCD
# Use this config for ARM targets with 2-wire SWD (SWDIO + SWCLK).
# TMS = SWDIO, TCK = SWCLK

adapter driver ch347
ch347 vid_pid 0x1a86 0x55dd 0x1a86 0x55de 0x1a86 0x55e7

# TCK/SWCLK frequency (kHz)
adapter speed 1000

transport select swd

# CH347 SWD has no SRST/NRST line — use software reset only.
# Without this, "reset halt" fails with "timed out waiting for target halted"
# when NRST is not physically wired to the target.
reset_config none
