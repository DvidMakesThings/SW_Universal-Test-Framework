# CH347 JTAG/SWD adapter configuration for OpenOCD
# Supports CH347T (Mode 3) and CH347F variants.

adapter driver ch347
ch347 vid_pid 0x1a86 0x55dd 0x1a86 0x55de 0x1a86 0x55e7

# TCK clock frequency (kHz). Supported: 469 938 1875 3750 7500 15000 30000 60000
adapter speed 10000

transport select jtag
